<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Dolce Piacere | Pastelería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: #e83e8c; color: white; padding: 60px 0; text-align: center; }
        .card { margin-bottom: 20px; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🍰 Il Dolce Piacere</h1>
        <p>Los dulces más ricos, ahora en la web</p>
    </div>

    <div class="container mt-5">
        <div class="row">
            {% for producto in productos %}
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ producto.nombre }}</h5>
                        <p class="card-text text-muted">{{ producto.precio }}</p>
                        <button class="btn btn-outline-danger">Pedir ahora</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
